              - generic [ref=e26]: "# Chest Pain 문진 가이드 ## 핵심 문진 항목 ### 통증 특성 - [ ] **Onset**: 언제부터? 갑자기(acute) vs 서서히(gradual)? - [ ] **Duration**: 얼마나 지속? 간헐적 vs 지속적? - [ ] **Location**: 어디가 아픈가? (left chest / substernal / right chest) - [ ] **Character**: 어떻게 아픈가? (squeezing / pressure / sharp / burning / stabbing) - [ ] **Radiation**: 방사통 있는가? (left arm / jaw / back / shoulder) - [ ] **Severity**: NRS 몇 점? ### 상황적 특성 - [ ] **Resting pain**: 쉬고 있을 때도 아픈가? - [ ] **Exertional pain**: 움직이면 더 아픈가? - [ ] **Aggravating/relieving factor**: 악화/완화 요인? - [ ] **NTG response**: NTG 투여했는가? 효과 있었는가? - [ ] **Ongoing**: 지금도 아픈가? ### 동반 증상 - [ ] Dyspnea - [ ] Diaphoresis (식은땀) - [ ] Nausea / Vomiting - [ ] Palpitation - [ ] Syncope / Presyncope - [ ] Fever / Chill ### 과거력 및 위험인자 - [ ] HTN, DM, Dyslipidemia, Smoking - [ ] 이전 ACS / CAG / PCI / CABG 이력 - [ ] 이전 유사 에피소드 --- ## 감별 진단 포인트 | 진단 | 주요 특징 | | --------------------------- | ------------------------------------------------------- | | **ACS** (UA/NSTEMI/STEMI) | Squeezing, 방사통, 운동 시 악화, diaphoresis | | **Aortic dissection** | Sudden onset tearing pain, back radiation, 양팔 BP 차이 | | **Pulmonary embolism** | Pleuritic chest pain + dyspnea + leg swelling | | **Pleuritis** | Sharp, 호흡 시 악화, 자세 변화에 영향 없음 | | **GERD / Esophageal spasm** | Burning, 식후 악화, NTG에 반응할 수 있음 | | **Costochondritis** | 누르면 재현되는 압통 | --- ## ⚠️ 위험 신호 (즉시 확인) - **Diaphoresis + chest pain** → ACS 강력 의심 - **Radiation to left arm / jaw** → ACS - **Sudden tearing pain + HTN 기저** → Aortic dissection - **Hypotension + tachycardia** → 심인성 쇼크, 대동맥 박리, 긴장성 기흉 - **New resting pain** → Unstable angina"
